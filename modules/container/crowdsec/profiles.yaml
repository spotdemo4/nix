name: distributed_http_range_remediation
filters:
  - Alert.Remediation == true && Alert.GetScope() == "Range" && Alert.GetScenario() in ["trev/http-distributed-subnet-v4", "trev/http-distributed-subnet-v6"]
decisions:
  - type: captcha
    scope: Range
    duration: 30m
on_success: break
---
name: captcha_remediation
filters:
  - Alert.Remediation == true && Alert.GetScope() == "Ip" && Alert.GetScenario() contains "http"
decisions:
  - type: captcha
    duration: 4h
on_success: break
---
name: default_ip_remediation
filters:
  - Alert.Remediation == true && Alert.GetScope() == "Ip"
decisions:
  - type: ban
    duration: 4h
duration_expr: "Sprintf('%dh', (GetDecisionsCount(Alert.GetValue()) + 1) * 4)"
on_success: break
